name: Atualizar Dashboards CEDESP

# Disparado pelo Apps Script OU manualmente pelo GitHub
on:
  workflow_dispatch:
  push:
    paths:
      - "1º_Sem__-__2026.xlsx"

jobs:
  gerar-dashboards:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Baixa o repositório
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configura Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Instala dependências
      - name: Instalar dependências
        run: |
          pip install pandas openpyxl

      # 4. Gera os dashboards
      - name: Gerar dashboard — Cursos e Frequência
        run: python gerar_dashboardv1.py "1º_Sem__-__2026.xlsx"

      - name: Gerar dashboard — Resumo Institucional (CEDESP)
        run: python gerar_dashboard_resumo_institucional.py "1º_Sem__-__2026.xlsx"

      - name: Gerar dashboard — Grade Complementar
        run: python gerar_dashboard_complementar.py .

      # 5. Commit e push dos HTMLs gerados
      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_cursos_frequencia.html
          git add dashboard_cedesp_2026.html
          git add dashboard_complementar.html
          git commit -m "Dashboards atualizados - $(date -u -d '3 hours ago' '+%d/%m/%Y %H:%M')"
          git push
